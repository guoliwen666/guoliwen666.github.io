<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析类笔记 | Guo Liwen</title>
    <link rel="shortcut icon" href="https://guoliwen666.github.io/logo.jpg?v=final">

    <style>
        /* --- 同步主页的柔粉色配色变量 --- */
        :root {
            --bg-color: #FDF0F3;      
            --card-bg: #ffffff;       
            --text-main: #5a4a4d;     
            --text-light: #9a8a8d;    
            --accent-color: #c57b8a;  
            --font-serif: "Georgia", "Noto Serif SC", "Songti SC", serif;
        }

        body {
            background-color: var(--bg-color);
            /* 增加粉色系网格底纹 */
            background-image: radial-gradient(rgba(197, 123, 138, 0.12) 1px, transparent 1px);
            background-size: 20px 20px; 
            color: var(--text-main);
            font-family: var(--font-serif);
            margin: 0;
            padding: 20px;
            line-height: 1.8;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* 顶部导航区 */
        .nav-header {
            margin-bottom: 40px;
            padding-top: 20px;
        }

        /* 返回按钮样式 */
        .back-btn {
            text-decoration: none;
            color: var(--accent-color);
            font-size: 0.9rem;
            border: 1px solid var(--accent-color);
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 4px 12px rgba(197, 123, 138, 0.3);
        }

        h1 {
            font-weight: normal;
            margin-top: 20px;
            border-bottom: 2px solid rgba(197, 123, 138, 0.15);
            padding-bottom: 10px;
            color: var(--text-main);
        }

        /* 列表样式 */
        .note-list {
            list-style: none;
            padding: 0;
        }

        .note-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 15px rgba(197, 123, 138, 0.05);
            display: flex;
            justify-content: space-between; 
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .note-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(197, 123, 138, 0.1);
        }

        .note-info {
            display: flex;
            flex-direction: column;
        }

        .note-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main); /* 替换了原来的硬编码 #333 */
        }

        .note-date {
            font-size: 0.85rem;
            color: var(--text-light); /* 替换了原来的硬编码 #999 */
            margin-top: 4px;
        }

        .download-link {
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
            padding: 8px 16px;
            background-color: rgba(197, 123, 138, 0.08); /* 适配主题的浅背景 */
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        
        .download-link:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* --- 自动同步主页的深色模式 --- */
        body.dark-mode { 
            --bg-color: #2a1a1d; 
            --card-bg: #362629; 
            --text-main: #e8d8db; 
            --text-light: #a8989b; 
            --accent-color: #e29fb0; 
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); 
        }
        body.dark-mode h1 { border-bottom-color: rgba(255, 255, 255, 0.1); } 
        body.dark-mode .download-link { background-color: rgba(226, 159, 176, 0.15); }
        body.dark-mode .download-link:hover { background-color: var(--accent-color); color: #1a1a1a; }
        body.dark-mode .back-btn:hover { color: #1a1a1a; }
        
        /* 手机端适配 */
        @media (max-width: 600px) {
            .note-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .download-link {
                margin-top: 15px;
                width: 100%;
                text-align: center;
                box-sizing: border-box; 
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="nav-header">
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h1>分析类笔记 (Analysis)</h1>
        <p style="color: var(--text-light); font-size: 0.9rem;">
            这里收录了我关于分析整理笔记.
        </p>
    </div>

   <ul class="note-list">
        
        <li class="note-item">
            <div class="note-info">
                <span class="note-title">数学分析基础整理</span>
                <span class="note-date">2025下半年 - 考研时笔记</span>
            </div>
            <a href="分析记.pdf" target="_blank" class="download-link">View PDF</a>
        </li>
    </ul>

    <footer style="text-align: center; margin-top: 40px; color: var(--text-light); font-size: 0.8rem;">
        &copy; 2026 Guo Liwen
    </footer>

</div>

<script>
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme === 'dark') {
        document.body.classList.add('dark-mode');
    }
</script>

</body>
</html>
