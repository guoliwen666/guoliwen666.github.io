<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杂记与随笔 | Guo Liwen</title>
    <link rel="shortcut icon" href="https://guoliwen666.github.io/logo.jpg?v=final">

    <style>
        :root {
            --bg-color: #FDF0F3;      
            --card-bg: #ffffff;       
            --text-main: #5a4a4d;     
            --text-light: #9a8a8d;    
            --accent-color: #c57b8a;  
            --font-serif: "Georgia", "Noto Serif SC", "Songti SC", serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(197, 123, 138, 0.12) 1px, transparent 1px);
            background-size: 20px 20px; 
            color: var(--text-main);
            font-family: var(--font-serif);
            margin: 0; padding: 20px; line-height: 1.8;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .nav-header { margin-bottom: 40px; padding-top: 20px; }
        .back-btn { text-decoration: none; color: var(--accent-color); font-size: 0.9rem; border: 1px solid var(--accent-color); padding: 5px 15px; border-radius: 20px; transition: all 0.2s; }
        .back-btn:hover { background-color: var(--accent-color); color: #fff; box-shadow: 0 4px 12px rgba(197, 123, 138, 0.3); }
        h1 { font-weight: normal; margin-top: 20px; border-bottom: 2px solid rgba(197, 123, 138, 0.15); padding-bottom: 10px; color: var(--text-main); }
        .note-list { list-style: none; padding: 0; }
        .note-item { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 15px rgba(197, 123, 138, 0.05); display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .note-item:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(197, 123, 138, 0.1); }
        .note-info { display: flex; flex-direction: column; }
        .note-title { font-size: 1.1rem; font-weight: bold; color: var(--text-main); }
        .note-date { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; }
        .download-link { text-decoration: none; color: var(--accent-color); font-weight: bold; padding: 8px 16px; background-color: rgba(197, 123, 138, 0.08); border-radius: 8px; transition: all 0.2s ease; }
        .download-link:hover { background-color: var(--accent-color); color: #fff; }

        body.dark-mode { --bg-color: #2a1a1d; --card-bg: #362629; --text-main: #e8d8db; --text-light: #a8989b; --accent-color: #e29fb0; background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); }
        body.dark-mode h1 { border-bottom-color: rgba(255, 255, 255, 0.1); } 
        body.dark-mode .download-link { background-color: rgba(226, 159, 176, 0.15); }
        body.dark-mode .download-link:hover { background-color: var(--accent-color); color: #1a1a1a; }
        body.dark-mode .back-btn:hover { color: #1a1a1a; }
        
        @media (max-width: 600px) { .note-item { flex-direction: column; align-items: flex-start; } .download-link { margin-top: 15px; width: 100%; text-align: center; box-sizing: border-box; } }
    </style>
</head>
<body>

<div class="container">
    
    <div class="nav-header">
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h1>杂记 (Misc & Thoughts)</h1>
        <p style="color: #666; font-size: 0.9rem;">
            除了数学，生活还有诗与远方。这里记录一些随笔、阅读与思考。
        </p>
    </div>
<div style="margin-top: 40px;">
        <h2 style="font-size: 1.3rem; color: var(--text-main); border-bottom: none;">
            📷 光影 (Moments)
        </h2>
        
        <div class="gallery-grid">
            
            <div class="photo-card">
                <img src="p1.jpg" alt="Photo 1" class="photo-img">
                <div class="photo-info">
                    <span class="photo-title">夏</span>
                    <span class="photo-meta">2024.07 于常州大学</span>
                    <p class="photo-desc">
                       备战考研时暑期学校图书馆前拍到的余晖
                    </p>
                </div>
            </div>

            <div class="photo-card">
                <img src="p2.jpg" alt="Photo 2" class="photo-img">
                <div class="photo-info">
                    <span class="photo-title">冬至</span>
                    <span class="photo-meta">2023.12 于图书馆前</span>
                    <p class="photo-desc">
                        当时刚上完课，这是大学印象里最深刻的一场雪.
                    </p>
                </div>
            </div>

            <div class="photo-card">
                <img src="p3.jpg" alt="Photo 3" class="photo-img">
                <div class="photo-info">
                    <span class="photo-title">念想 </span>
                    <span class="photo-meta">2017.6</span>
                    <p class="photo-desc">
                        永远离开了我的小狗，它的名字叫大黄.
                    </p>
                </div>
            </div>
            
            </div>
    </div>
    <footer style="text-align: center; margin-top: 40px; color: #ccc; font-size: 0.8rem;">
        &copy; 2026 Guo Liwen
    </footer>

</div>

</body>
</html>
